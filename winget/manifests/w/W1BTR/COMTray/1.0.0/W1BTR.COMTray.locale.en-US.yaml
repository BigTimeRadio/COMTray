ShortDescription: Tray monitor that announces new COM ports and the USB socket each one uses.
Description: >-
  COM Port Tray is a lightweight Windows system tray utility that watches for serial (COM)
  ports appearing and disappearing. When a new port arrives it shows a notification naming
  the device and the physical USB socket it is plugged into, and the tray icon always shows
  the most recent COM number. You can give each USB socket a friendly name. It is event
  driven, so it stays idle until devices actually change.
